name: Deploy CIPP API

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy API
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: YOUR-FUNCTION-APP-NAME
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DF46B1120DCA45F3A6911EB1C9D1AAE6 }}
